<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ApplyKit</title>
    <meta name="description" content="Store your profile once. Fill job applications everywhere." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="header-brand">
          <div class="logo-mark" aria-hidden="true">
            <!-- Lightning bolt — represents "instant fill" -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </div>
          <span class="logo-name">ApplyKit</span>
        </div>
        <span class="version-badge" aria-label="Version Beta">Beta</span>
      </header>

      <div class="hr" role="separator"></div>

      <!-- Scrollable profile form area -->
      <main class="main" id="main-scroll" aria-label="Profile form">
        <div id="profile-form" role="form" aria-label="Profile fields"></div>

        <button
          id="add-field-btn"
          class="add-btn"
          type="button"
          aria-label="Add a custom profile field"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Custom Field
        </button>
      </main>

      <div class="hr" role="separator"></div>

      <!-- Footer: status + actions -->
      <footer class="footer">
        <div
          id="status-bar"
          class="status-bar"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>
        <div class="footer-actions">
          <button id="save-btn" class="btn-outline" type="button">Save</button>
          <button id="fill-btn" class="btn-primary" type="button">
            Fill Application
          </button>
        </div>
      </footer>
    </div>

    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
