<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porter</title>
    <meta name="description" content="Store your profile once. Fill job applications everywhere." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="header-brand">
          <div class="logo-mark" aria-hidden="true">
            <!-- Lightning bolt — represents "instant fill" -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </div>
          <span class="logo-name">Porter</span>
        </div>
        <a href="https://github.com/M-SaaD-H/porter" target="_blank" rel="noopener noreferrer" class="github-link" aria-label="GitHub Repository">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
      </header>

      <div class="hr" role="separator"></div>

      <!-- Scrollable profile form area -->
      <main class="main" id="main-scroll" aria-label="Profile form">
        <div id="profile-form" role="form" aria-label="Profile fields"></div>

        <button
          id="add-field-btn"
          class="add-btn"
          type="button"
          aria-label="Add a custom profile field"
        >
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Custom Field
        </button>
      </main>

      <div class="hr" role="separator"></div>

      <!-- Footer: status + actions -->
      <footer class="footer">
        <div
          id="status-bar"
          class="status-bar"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>
        <div class="footer-actions">
          <button id="save-btn" class="btn-outline" type="button">Save</button>
          <button id="fill-btn" class="btn-primary" type="button">
            Fill Application
          </button>
        </div>
      </footer>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
